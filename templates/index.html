<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc, #ff6ec4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 420px;
            height: 600px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            background: linear-gradient(135deg, #6a11cb, #2575fc, #ff6ec4);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            animation: glow 2s infinite alternate;
        }

        .team-name {
            font-size: 14px;
            color: #ffddff;
            text-shadow: 0 0 8px #ff6ec4;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff; }
            to { text-shadow: 0 0 15px #ff6ec4; }
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message-row {
            display: flex;
            margin-bottom: 10px;
            align-items: flex-end;
            animation: fadeIn 0.3s ease-in;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 0 5px;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 15px;
            max-width: 65%;
            font-size: 14px;
        }

        .user-bubble {
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            color: white;
        }

        .bot-bubble {
            background: #f1f1f1;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: linear-gradient(135deg, #ff6ec4, #7873f5);
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .typing {
            font-style: italic;
            color: gray;
            margin-left: 40px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">
        🤖 College Help Desk<br>
        <span class="team-name">⚡ Nexus Neuron ⚡</span>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-box">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function createMessage(text, sender) {
    let row = document.createElement("div");
    row.className = "message-row " + (sender === "user" ? "user-row" : "bot-row");

    let avatar = document.createElement("img");
    avatar.className = "avatar";
    avatar.src = sender === "user"
        ? "https://cdn-icons-png.flaticon.com/512/847/847969.png"
        : "https://cdn-icons-png.flaticon.com/512/4712/4712109.png";

    let bubble = document.createElement("div");
    bubble.className = "bubble " + (sender === "user" ? "user-bubble" : "bot-bubble");
    bubble.innerText = text;

    if (sender === "user") {
        row.appendChild(bubble);
        row.appendChild(avatar);
    } else {
        row.appendChild(avatar);
        row.appendChild(bubble);
    }

    return row;
}

function sendMessage() {
    let input = document.getElementById("user-input");
    let message = input.value.trim();

    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.appendChild(createMessage(message, "user"));
    input.value = "";

    // typing indicator
    let typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "Bot is typing...";
    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + encodeURIComponent(message)
    })
    .then(res => res.json())
    .then(data => {
        typing.remove();
        chatBox.appendChild(createMessage(data.response, "bot"));
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Enter key support
document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
